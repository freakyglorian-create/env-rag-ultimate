# ============================================
# 环境工程 RAG Ultimate - Docker Compose
# ============================================

services:
  # ===== 后端 FastAPI 服务 =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: env-rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - vector_store:/app/data/vector_store
      - uploads:/app/data/uploads
      - evaluation:/app/data/evaluation
    environment:
      - DEBUG=false
      - DEFAULT_LLM_PROVIDER=deepseek
      - DEFAULT_LLM_MODEL=deepseek-chat
      - EMBEDDING_MODEL=BAAI/bge-large-zh-v1.5
      - EMBEDDING_DEVICE=cpu
      - RERANKER_MODEL=BAAI/bge-reranker-base
      - USE_RERANKER=true
      - ENABLE_QUERY_REWRITE=true
      - ENABLE_MULTI_QUERY=false
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=100
      - HF_ENDPOINT=https://hf-mirror.com
    networks:
      - env-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ===== 前端 Nginx 静态文件服务 =====
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: env-rag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - env-rag-network

volumes:
  vector_store:
  uploads:
  evaluation:

networks:
  env-rag-network:
    driver: bridge
