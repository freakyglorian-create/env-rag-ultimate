# ============================================
# 环境工程 RAG Ultimate - Docker Compose
# ============================================
version: "3.8"

services:
  # ===== 后端 FastAPI 服务 =====
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: env-rag-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 持久化向量存储和上传数据
      - ./data/vector_store:/app/data/vector_store
      - ./data/uploads:/app/data/uploads
      - ./data/evaluation:/app/data/evaluation
    environment:
      - DEBUG=false
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DEFAULT_LLM_PROVIDER=ollama
      - DEFAULT_LLM_MODEL=qwen2.5:7b
      - EMBEDDING_MODEL=BAAI/bge-large-zh-v1.5
      - EMBEDDING_DEVICE=cpu
    networks:
      - env-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===== 前端 Nginx 静态文件服务 =====
  frontend:
    image: nginx:alpine
    container_name: env-rag-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 挂载前端构建产物
      - ./frontend/dist:/usr/share/nginx/html:ro
      # 挂载 Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - env-rag-network

networks:
  env-rag-network:
    driver: bridge
